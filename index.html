<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #1877f2;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      position: fixed;
      width: 100%;
      top: 0;
    }

    main {
      padding: 70px 10px 70px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #42b72a;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

  <header>📱 My App</header>

  <main>

    <div class="card">
      <h2>Post 1</h2>
      <img src="https://via.placeholder.com/300">
      <p>នេះជាការបង្ហាញរូប 😎</p>
      <button onclick="like1()">
        👍 Like (<span id="count1">0</span>)
      </button>
    </div>

    <div class="card">
      <h2>Post 2</h2>
      <img src="https://via.placeholder.com/300">
      <p>ខ្ញុំកំពុងរៀន HTML 🚀</p>
      <button onclick="like2()">
        👍 Like (<span id="count2">0</span>)
      </button>
    </div>

  </main>

  <footer>
    <div>🏠 Home</div>
    <div>🔍 Search</div>
    <div>👤 Profile</div>
  </footer>

  <script>
    let c1 = 0;
    let c2 = 0;

    function like1() {
      c1++;
      document.getElementById("count1").innerText = c1;
    }

    function like2() {
      c2++;
      document.getElementById("count2").innerText = c2;
    }
  </script>

</body>
</html>
