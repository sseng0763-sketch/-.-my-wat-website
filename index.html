<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    /* Header */
    header {
      background: #1877f2;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      position: fixed;
      width: 100%;
      top: 0;
    }

    /* Content */
    main {
      padding: 70px 10px 70px;
    }

    /* Card */
    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* Button */
    button {
      background: #42b72a;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
    }

    /* Bottom Menu */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }

    footer div {
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    📱 My App
  </header>

  <main>

    <div class="card">
      <h2>សួស្តី! 🌍</h2>
      <p>នេះជាវេបសាយរបស់ខ្ញុំ</p>
      <button onclick="alert('សូមអរគុណ! ❤️')">ចុច</button>
    </div>

    <div class="card">
      <h2>ព័ត៌មាន</h2>
      <p>នេះជាការសាកល្បង UI ដូច app</p>
    </div>

  </main>

  <footer>
    <div>🏠 Home</div>
    <div>🔍 Search</div>
    <div>👤 Profile</div>
  </footer>

</body>
</html>
