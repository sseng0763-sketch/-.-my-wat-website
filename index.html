<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
</head>

<body>

  <header>My App 🚀</header>

  <main>

    <!-- Post 1 -->
    <div class="card">
      <h2>Post 1</h2>
      <img src="https://via.placeholder.com/300" style="width:100%; border-radius:10px;">
      <p>នេះជាការបង្ហាញ 😎</p>
      <button onclick="like1()">
        👍 Like (<span id="count1">0</span>)
      </button>
    </div>

    <!-- Post 2 -->
    <div class="card">
      <h2>Post 2</h2>
      <img src="https://via.placeholder.com/300" style="width:100%; border-radius:10px;">
      <p>ខ្ញុំកំពុងរៀន HTML 🚀</p>
      <button onclick="like2()">
        👍 Like (<span id="count2">0</span>)
      </button>
    </div>

  </main>

  <script>
    let c1 = 0;
    let c2 = 0;

    function like1() {
      c1++;
      document.getElementById("count1").innerText = c1;
    }

    function like2() {
      c2++;
      document.getElementById("count2").innerText = c2;
    }
  </script>

</body>
</html>
