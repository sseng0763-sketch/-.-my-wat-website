<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #1877f2;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      position: fixed;
      width: 100%;
      top: 0;
    }

    main {
      padding: 70px 10px 70px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
  background: #42b72a;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 5px;
  transition: all 0.3s;
}

.liked {
  background: red !important;
  transform: scale(1.1);
}
    button:active {
  transform: scale(0.95);
}
.heart {
  position: absolute;
  color: red;
  font-size: 20px; 
  animation: floatUp 1s ease forwards;
  pointer-events: none;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<header>📱 My App</header>

<main>

  <!-- Post 1 -->
  <div class="card">
    <h2>Post 1</h2>
    <p>...</p>

    <button id="btn1" onclick="like1(this)">
  👍 Like (<span id="count1">0</span>)
</button>

    <!-- Comment -->
    <div class="comment-box">
      <input type="text" id="input1" placeholder="Write a comment...">
      <button onclick="addComment('input1','list1')">Post</button>
    </div>

    <ul id="list1"></ul>
  </div>

  <!-- Post 2 -->
  <div class="card">
    <h2>Post 2</h2>
    <p>...</p>

    <button id="btn1" onclick="like1(this)">
  👍 Like (<span id="count1">0</span>)
</button>

    <!-- Comment -->
    <div class="comment-box">
      <input type="text" id="input2" placeholder="Write a comment...">
      <button onclick="addComment('input2','list2')">Post</button>
    </div>

    <ul id="list2"></ul>
  </div>

</main>
 <script>
let c1 = 0;
let liked1 = false;

function like1(btn) {
  let count = document.getElementById("count1");

  if (!liked1) {
    c1++;
    liked1 = true;
    btn.classList.add("liked");
  } else {
    c1--;
    liked1 = false;
    btn.classList.remove("liked");
  }

  count.innerText = c1;

  // ❤️ បង្កើត heart
  createHeart(btn);
}

function createHeart(btn) {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";

  // ទីតាំង
  let rect = btn.getBoundingClientRect();
  heart.style.left = rect.left + rect.width / 2 - 10 + "px";
  heart.style.top = rect.top + "px";

  document.body.appendChild(heart);

  // លុបក្រោយ animation
  setTimeout(() => {
    heart.remove();
  }, 1000);
}
</script>
