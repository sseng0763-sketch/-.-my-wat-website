<!DOCTYPE html>
<html>
<head>
  <title>My App</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f0f2f5;
    }

    h1 {
      color: blue;
    }

    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      transition: 0.3s;
    }

    button.liked {
      background: red;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h1>My App</h1>

<button onclick="like(this)">
  Like ❤️ (<span>0</span>)
</button>
<script>
window.onload = () => {
  let saved = localStorage.getItem("likeCount");

  if (saved) {
    document.querySelector("span").innerText = saved;
  }
};

function like(btn) {
  let count = btn.querySelector("span");
  let c = parseInt(count.innerText);

  if (btn.classList.contains("liked")) {
    btn.classList.remove("liked");
    count.innerText = c - 1;
  } else {
    btn.classList.add("liked");
    count.innerText = c + 1;
  }

  localStorage.setItem("likeCount", count.innerText);
}
  function doubleLike(box) {
  let btn = box.querySelector("button");
  let count = btn.querySelector("span");
  let c = parseInt(count.innerText);

  // បើមិនទាន់ like
  if (!btn.classList.contains("liked")) {
    btn.classList.add("liked");
    count.innerText = c + 1;

    localStorage.setItem("likeCount", count.innerText);
  }

  showBigHeart(box);
}
  function showBigHeart(box) {
  let heart = document.createElement("div");
  heart.innerText = "❤️";

  heart.style.position = "absolute";
  heart.style.fontSize = "60px";
  heart.style.left = Math.random() * 80 + 10 + "%";
  heart.style.top = Math.random() * 80 + 10 + "%";
  heart.style.transform = "translate(-50%, -50%) rotate(0deg)";
  heart.style.transition = "all 0.4s ease-out";
  heart.style.opacity = "1";

  box.appendChild(heart);

  let moveY = -50 - Math.random() * 50;
  let rotate = Math.random() * 60 - 30;

  setTimeout(() => {
    heart.style.opacity = "0";
    heart.style.transform = `translate(-50%, ${moveY}%) rotate(${rotate}deg)`;
  }, 100);

  setTimeout(() => {
    heart.remove();
  }, 600);
}
</script>

</body>
</html>
