<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      text-align: center;
      padding: 50px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: inline-block;
    }

    h1 {
      color: #333;
    }

    p {
      color: #666;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>សួស្តី! 🌍</h1>
    <p>នេះជាវេបសាយដំបូងរបស់ខ្ញុំ</p>
    <button onclick="alert('Hello 👋')">ចុចខ្ញុំ</button>
  </div>

</body>
</html>
