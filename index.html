<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #1877f2;
      color: white;
      text-align: center;
      padding: 15px;
      position: fixed;
      width: 100%;
      top: 0;
    }

    main {
      padding: 70px 10px 70px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      position: relative;
    }

    button {
      background: #42b72a;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      transition: 0.3s;
    }

    button.liked {
      background: red;
      transform: scale(1.1);
    }

    button:active {
      transform: scale(0.95);
    }

    /* ❤️ small hearts */
    .heart {
      position: absolute;
      color: red;
      animation: floatUp 1s ease forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
    }

    /* ❤️ BIG HEART */
    .big-heart {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 80px;
      opacity: 0;
      pointer-events: none;
      animation: pop 0.6s ease forwards;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<header>📱 My App</header>

<main>

  <!-- Post -->
  <div class="card" ondblclick="doubleLike(this)">
    <h2>Post</h2>
    <p>Double tap ❤️</p>

    <button onclick="like(this)">
      👍 Like (<span>0</span>)
    </button>

    <div class="comment-box">
      <input type="text" placeholder="Write a comment...">
      <button onclick="addComment(this)">Post</button>
    </div>

    <ul></ul>
  </div>

</main>

<footer>
  <div>🏠</div>
  <div>🔍</div>
  <div>➕</div>
  <div>❤️</div>
  <div>👤</div>
</footer>

<script>
// 👍 LIKE BUTTON
function like(btn) {
  let count = btn.querySelector("span");
  let c = parseInt(count.innerText);

  if (!btn.classList.contains("liked")) {
    btn.classList.add("liked");
    count.innerText = c + 1;
  } else {
    btn.classList.remove("liked");
    count.innerText = c - 1;
  }

  createHearts(btn);
}

// ❤️ DOUBLE TAP
function doubleLike(card) {
  let btn = card.querySelector("button");

  if (!btn.classList.contains("liked")) {
    btn.classList.add("liked");

    let count = btn.querySelector("span");
    count.innerText = parseInt(count.innerText) + 1;
  }

  createHearts(btn);
  showBigHeart(card);
}

// 💥 small hearts
function createHearts(btn) {
  let rect = btn.getBoundingClientRect();

  for (let i = 0; i < 6; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "❤️";

    let offsetX = (Math.random() - 0.5) * 50;
    let offsetY = Math.random() * 20;

    heart.style.left = rect.left + rect.width / 2 + offsetX + "px";
    heart.style.top = rect.top - offsetY + "px";

    heart.style.fontSize = (16 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 1000);
  }
}

// ❤️ BIG center heart
function showBigHeart(card) {
  let big = document.createElement("div");
  big.className = "big-heart";
  big.innerText = "❤️";

  card.appendChild(big);

  setTimeout(() => big.remove(), 600);
}

// 💬 COMMENT
function addComment(btn) {
  let box = btn.parentElement;
  let input = box.querySelector("input");
  let list = box.nextElementSibling;

  if (input.value.trim() === "") return;

  let li = document.createElement("li");
  li.innerText = input.value;

  list.appendChild(li);
  input.value = "";
}
</script>

</body>
</html>
