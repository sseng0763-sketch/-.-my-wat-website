<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #1877f2;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      position: fixed;
      width: 100%;
      top: 0;
    }

    main {
      padding: 70px 10px 70px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      background: #42b72a;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      transition: all 0.3s;
    }

    button:active {
      transform: scale(0.95);
    }

    .liked {
      background: red !important;
      transform: scale(1.1);
    }

    /* ❤️ heart effect */
    .heart {
      position: absolute;
      color: red;
      animation: floatUp 1s ease forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }

    .comment-box {
      margin-top: 10px;
      display: flex;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    ul {
      margin-top: 10px;
      padding-left: 20px;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<header>📱 My App</header>

<main>

  <!-- Post 1 -->
  <div class="card">
    <h2>Post 1</h2>
    <p>...</p>

    <button onclick="like(this)">
      👍 Like (<span>0</span>)
    </button>

    <div class="comment-box">
      <input type="text" id="input1" placeholder="Write a comment...">
      <button onclick="addComment('input1','list1')">Post</button>
    </div>

    <ul id="list1"></ul>
  </div>

  <!-- Post 2 -->
  <div class="card">
    <h2>Post 2</h2>
    <p>...</p>

    <button onclick="like(this)">
      👍 Like (<span>0</span>)
    </button>

    <div class="comment-box">
      <input type="text" id="input2" placeholder="Write a comment...">
      <button onclick="addComment('input2','list2')">Post</button>
    </div>

    <ul id="list2"></ul>
  </div>

</main>

<script>
/* 👍 LIKE */
function like(btn) {
  let count = btn.querySelector("span");
  let liked = btn.classList.contains("liked");
  let c = parseInt(count.innerText);

  if (!liked) {
    c++;
    btn.classList.add("liked");
  } else {
    c--;
    btn.classList.remove("liked");
  }

  count.innerText = c;

  createHeart(btn);
}

/* ❤️ HEART EFFECT */
function createHeart(btn) {
  let rect = btn.getBoundingClientRect();

  for (let i = 0; i < 5; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "❤️";

    let offsetX = (Math.random() - 0.5) * 40;
    let offsetY = Math.random() * 20;

    heart.style.left = rect.left + rect.width / 2 + offsetX + "px";
    heart.style.top = rect.top - offsetY + "px";

    let size = 16 + Math.random() * 20;
    heart.style.fontSize = size + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 1000);
  }
}

/* 💬 COMMENT */
function addComment(inputId, listId) {
  let input = document.getElementById(inputId);
  let list = document.getElementById(listId);

  if (input.value.trim() === "") return;

  let li = document.createElement("li");
  li.innerText = input.value;

  list.appendChild(li);
  input.value = "";
}
</script>

</body>
</html>
