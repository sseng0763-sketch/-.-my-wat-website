<!DOCTYPE html>
<html>
<head>
  <title>My App</title>

  <!-- 🎨 CSS -->
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #1877f2;
      color: white;
      text-align: center;
      padding: 15px;
      position: fixed;
      width: 100%;
      top: 0;
    }

    main {
      padding: 70px 10px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
    }

    .liked {
      background: red;
    }

    /* 🌙 dark mode */
    body.dark {
      background: #18191a;
      color: white;
    }

    body.dark .card {
      background: #242526;
    }
  </style>
</head>

<body>

  <!-- 🧱 HTML -->
  <header>
    📱 My App
    <button onclick="toggleDark()">🌙</button>
  </header>

  <main>
    <div class="card">
      <h2>Post</h2>

      <button onclick="like(this)">
        👍 Like (<span>0</span>)
      </button>
    </div>
  </main>

  <!-- ⚙️ JavaScript -->
  <script>
    function like(btn) {
      let span = btn.querySelector("span");
      let count = parseInt(span.innerText);

      if (!btn.classList.contains("liked")) {
        btn.classList.add("liked");
        span.innerText = count + 1;
      } else {
        btn.classList.remove("liked");
        span.innerText = count - 1;
      }
    }

    function toggleDark() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
